image:
  name: "python:3.11"
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
stages:
  - build
  - deploy

cache:
  paths:
    - .cache/pip
    - .venv/
before_script:
  - python3 --version
  - python3 -m venv .venv
  - source .venv/bin/activate
  - pip install -r src/requirements.txt
  - mkdir -p .output


compile:
  stage: build
  tags:
    - group_runner_spraaksamlingene_01
  script:
    - python src/md2vue.py
    - cp content-images .output/content-images -r
    - tar -czvf content-components.tar.gz -C .output .
  artifacts:
    paths:
      - content-components.tar.gz

trigger_redeploy:
  stage: deploy
  image: curlimages/curl:latest
  tags:
    - group_runner_spraaksamlingene_01
  needs:
    - job: compile
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "feat-meta-1430"'
      changes:
        - "**/*.md"
        - "content-images/**/*"
  before_script: []
  script:
    - curl --fail --silent --show-error -X POST "$WEBHOOK" > /dev/null